# Upstream test-parity inventory — the machine-readable record behind firm's port promise that
# its test suite is a *superset* of the Rails Solid gems' tests (minus documented divergences).
#
# Enforced by scripts/check_parity.py (CI + pre-commit). See docs/testing-and-contributing.md for
# the full TEST-PORTING contract. Each [[<module>]] entry names one upstream Solid test file and
# how firm covers it:
#
#   upstream   = "ready_execution_test.rb"        # the upstream Ruby test file (or file::case)
#   ported_by  = ["tests/queue/test_parity_x.py"] # firm test file(s) that cite/port it
#   # ...or, for a deliberate gap:
#   diverged   = true
#   reason     = "why firm doesn't port this (point at comparison-to-rails.md)"
#
# The checker fails if: a firm test cites a `*.rb` not listed here (drift), a `ported_by` file is
# missing or no longer cites its upstream (rot), a `ported` upstream is cited by no test (dead
# entry), or a `diverged` entry has no reason (honesty). Adding *upstream* files is a manual step
# when reconciling against a new Solid release (bump [meta] below); the checker then keeps the
# mapping honest.

[meta]
# Solid releases this inventory was last reconciled against — bump when re-syncing to upstream.
solid_queue = "rails/solid_queue (2026-06)"
solid_cache = "rails/solid_cache (2026-06)"
solid_cable = "rails/solid_cable (2026-06)"

