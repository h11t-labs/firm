# Publish workspace packages to PyPI via trusted publishing (OIDC — no long-lived tokens).
#
# Two tag shapes drive releases (see docs/testing-and-contributing.md § Releasing):
#   v0.1.0            → build every workspace package; publish whatever isn't on PyPI yet
#                       (already-published files are skipped, so this is idempotent)
#   firm-queue-v0.2.0 → build + publish that one package; the tag version must match its
#                       pyproject.toml or the run fails before anything is uploaded
name: Release

on:
  push:
    tags:
      - "v[0-9]*" # all packages
      - "*-v[0-9]*" # a single package, e.g. firm-cache-v0.1.1

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      package: ${{ steps.select.outputs.package }}
      version: ${{ steps.select.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - name: Parse tag
        id: select
        run: |
          TAG="$GITHUB_REF_NAME"
          if [[ "$TAG" == *-v[0-9]* ]]; then
            echo "package=${TAG%-v[0-9]*}" >> "$GITHUB_OUTPUT"
            echo "version=${TAG##*-v}" >> "$GITHUB_OUTPUT"
          else
            echo "package=" >> "$GITHUB_OUTPUT"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          fi
      - name: Check tag version matches pyproject
        if: steps.select.outputs.package != ''
        env:
          PACKAGE: ${{ steps.select.outputs.package }}
          VERSION: ${{ steps.select.outputs.version }}
        run: |
          python3 - <<'EOF'
          import os, sys, tomllib

          package, version = os.environ["PACKAGE"], os.environ["VERSION"]
          with open(f"packages/{package}/pyproject.toml", "rb") as f:
              actual = tomllib.load(f)["project"]["version"]
          if actual != version:
              sys.exit(f"tag says {package} {version}, pyproject.toml says {actual}")
          EOF
      - name: Check changelog covers the released version
        env:
          PACKAGE: ${{ steps.select.outputs.package }}
        run: |
          if [[ -n "$PACKAGE" ]]; then
            python3 scripts/check_changelog.py "$PACKAGE"
          else
            python3 scripts/check_changelog.py --all
          fi
      - name: Run tests
        run: |
          uv sync --locked
          uv run pytest
      - name: Build
        env:
          PACKAGE: ${{ steps.select.outputs.package }}
        run: |
          if [[ -n "$PACKAGE" ]]; then
            uv build --package "$PACKAGE"
          else
            uv build --all-packages
            # TEMPORARY: the PyPI name "firm" is squatted (registered, no releases) and a
            # PEP 541 name-transfer request is pending. Publishing the meta-package would 403
            # and abort the whole upload, so drop it from all-package releases until the name
            # is ours. Remove these two lines once the transfer is granted.
            rm -f dist/firm-[0-9]*
          fi
      - name: Check metadata renders
        run: uvx twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/firm/
    permissions:
      id-token: write # OIDC for PyPI trusted publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: astral-sh/setup-uv@v7
      - name: Publish to PyPI
        # --check-url skips files already on PyPI, making all-package tags idempotent.
        run: uv publish --check-url https://pypi.org/simple/ dist/*

  # Create a GitHub Release for the tag once the PyPI upload succeeded: the changelog section
  # for the released version as the body, with auto-generated notes (PR titles) appended.
  github-release:
    needs: [build, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7
      - name: Write release body
        env:
          PACKAGE: ${{ needs.build.outputs.package }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          if [[ -n "$PACKAGE" ]]; then
            # Extract this version's section from the package changelog (up to the next
            # version heading), dropping the trailing link-reference lines.
            awk -v v="$VERSION" '
              index($0, "## [" v "]") == 1 { on = 1; next }
              on && /^## /                 { exit }
              on && !/^\[[^]]+\]: http/    { print }
            ' "packages/$PACKAGE/CHANGELOG.md" > body.md
            echo "" >> body.md
            echo "Full changelog: [packages/$PACKAGE/CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/packages/$PACKAGE/CHANGELOG.md)" >> body.md
          else
            echo "Coordinated release of all firm packages. Per-package changelogs:" > body.md
            echo "" >> body.md
            for d in packages/*/; do
              p="$(basename "$d")"
              echo "- [$p](https://github.com/${{ github.repository }}/blob/main/packages/$p/CHANGELOG.md)" >> body.md
            done
          fi
      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" --verify-tag \
            --title "$GITHUB_REF_NAME" --notes-file body.md --generate-notes
