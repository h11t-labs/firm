[project]
name = "firm-audit"
version = "0.1.0"
description = "Database-backed append-only audit log. No Redis required — runs on SQLite, PostgreSQL, or MySQL."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
license-files = ["LICENSE", "NOTICE"]
authors = [{ name = "firm contributors" }]
keywords = ["audit", "log", "sqlite", "postgresql", "mysql"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3 :: Only",
    "Topic :: Database",
    "Typing :: Typed",
]
dependencies = [
    "firm-core~=0.1.0",
    "click>=8.1",
]

[project.optional-dependencies]
postgres = ["firm-core[postgres]"]     # PostgreSQL driver (via firm-core)
mysql = ["firm-core[mysql]"]           # MySQL / MariaDB driver (via firm-core)

[project.scripts]
firm-audit = "firm.audit.cli:main"

[project.urls]
Homepage = "https://github.com/h11t-labs/firm"
Documentation = "https://h11t-labs.nl/firm/"
Repository = "https://github.com/h11t-labs/firm"
Issues = "https://github.com/h11t-labs/firm/issues"

[build-system]
requires = ["uv_build>=0.11,<0.12"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "firm.audit"
namespace = true
