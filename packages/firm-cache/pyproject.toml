[project]
name = "firm-cache"
version = "1.0.0"
description = "Database-backed cache store (a pure-Python port of Rails' Solid Cache). No Redis required — runs on SQLite, PostgreSQL, or MySQL."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
license-files = ["LICENSE", "NOTICE"]
authors = [{ name = "firm contributors" }]
keywords = ["cache", "sqlite", "postgresql", "mysql", "solid_cache"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3 :: Only",
    "Topic :: Database",
    "Typing :: Typed",
]
dependencies = [
    "firm-core~=1.0.0",
    "click>=8.1",
]

[project.optional-dependencies]
encryption = ["cryptography>=42"]      # at-rest encryption (Fernet)
msgpack = ["msgpack>=1.0"]             # msgpack value coder
postgres = ["firm-core[postgres]"]     # PostgreSQL driver (via firm-core)
mysql = ["firm-core[mysql]"]           # MySQL / MariaDB driver (via firm-core)

[project.scripts]
firm-cache = "firm.cache.cli:main"

[project.urls]
Homepage = "https://github.com/h11t-labs/firm"
Documentation = "https://h11t-labs.github.io/firm/"
Repository = "https://github.com/h11t-labs/firm"
Issues = "https://github.com/h11t-labs/firm/issues"
Changelog = "https://github.com/h11t-labs/firm/blob/main/packages/firm-cache/CHANGELOG.md"

[build-system]
requires = ["uv_build>=0.11.29,<0.12"]
build-backend = "uv_build"

[tool.uv.build-backend]
source-include = ["CHANGELOG.md"]
module-name = "firm.cache"
namespace = true
