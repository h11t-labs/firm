[project]
name = "firm-queue"
version = "1.0.0"
description = "Database-backed background jobs (a pure-Python port of Rails' Solid Queue). No Redis required — runs on SQLite, PostgreSQL, or MySQL."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
license-files = ["LICENSE", "NOTICE"]
authors = [{ name = "firm contributors" }]
keywords = ["jobs", "queue", "background", "tasks", "sqlite", "postgresql", "mysql", "solid_queue"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3 :: Only",
    "Topic :: Database",
    "Topic :: System :: Distributed Computing",
    "Typing :: Typed",
]
dependencies = [
    "firm-core~=1.0.0",
    "croniter>=6.2.4",
    "click>=8.1",
]

[project.optional-dependencies]
flask = ["flask>=3.0"]                 # firm.contrib.flask integration
fastapi = ["fastapi>=0.110"]           # firm.contrib.fastapi integration
postgres = ["firm-core[postgres]"]     # PostgreSQL driver (via firm-core)
mysql = ["firm-core[mysql]"]           # MySQL / MariaDB driver (via firm-core)

[project.scripts]
firm-queue = "firm.queue.cli:main"

[project.urls]
Homepage = "https://github.com/h11t-labs/firm"
Documentation = "https://h11t-labs.github.io/firm/"
Repository = "https://github.com/h11t-labs/firm"
Issues = "https://github.com/h11t-labs/firm/issues"
Changelog = "https://github.com/h11t-labs/firm/blob/main/packages/firm-queue/CHANGELOG.md"

[build-system]
requires = ["uv_build>=0.11.29,<0.12"]
build-backend = "uv_build"

# firm-queue ships two namespace sub-packages: firm.queue and firm.contrib
# (contrib only depends on queue, so it lives here rather than in its own dist).
[tool.uv.build-backend]
source-include = ["CHANGELOG.md"]
namespace = true
module-name = ["firm.queue", "firm.contrib"]
