[project]
name = "firm-core"
version = "0.1.0"
description = "🪨 Shared internal infrastructure for the firm packages (engine/connection handling, dialects, poller, config). Not intended for direct use."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
license-files = ["LICENSE", "NOTICE"]
authors = [{ name = "firm contributors" }]
keywords = ["sqlalchemy", "alembic", "sqlite", "postgresql", "mysql"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3 :: Only",
    "Topic :: Database",
    "Typing :: Typed",
]
dependencies = [
    "sqlalchemy>=2.0",
    "alembic>=1.13",
]

[project.optional-dependencies]
postgres = ["psycopg[binary]>=3.1"]   # PostgreSQL driver
mysql = ["pymysql>=1.1"]               # MySQL / MariaDB driver

[project.urls]
Homepage = "https://github.com/h11t-labs/firm"
Documentation = "https://h11t-labs.github.io/firm/"
Repository = "https://github.com/h11t-labs/firm"
Issues = "https://github.com/h11t-labs/firm/issues"

[build-system]
requires = ["uv_build>=0.11,<0.12"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "firm._core"
namespace = true
