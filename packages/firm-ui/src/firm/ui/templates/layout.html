<!doctype html>
<html data-theme="{{ theme }}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{%- if refresh %}
<meta http-equiv="refresh" content="{{ refresh }}">
{%- endif %}
<link rel="icon" href="{{ favicon }}">
<link rel="stylesheet" href="/static/style.css">
<title>{{ title }} · firm</title>
</head>
<body><Header tabs={{ header_tabs }} active_part={{ active_part }} request_path={{ request_path }} refresh={{ refresh }} refresh_label={{ refresh_label }} refresh_choices={{ refresh_choices }} theme_toggle={{ theme_toggle }} />{% if statenav_items %}<StateNav items={{ statenav_items }} />{% endif %}{% block content %}{% endblock %}</body>
</html>
